name: 'Stencil Sass Dev Release'

on:
  workflow_call:

permissions:
  # write is required because this workflow calls publish-npm.yml, which declares
  # contents: write for the production release path (git commit/tag). GitHub validates
  # permissions statically against the caller regardless of the `tag == 'latest'` runtime
  # gating in publish-npm.yml, so this can't be narrower even though dev never writes.
  contents: write
  id-token: write

jobs:
  build_stencil_sass:
    name: 🏗️ Build Stencil Sass
    uses: ./.github/workflows/build.yml

  get_dev_version:
    name: 🔍 Get Dev Build Version
    runs-on: ubuntu-latest
    needs: build_stencil_sass
    outputs:
      dev-version: ${{ steps.generate-dev-version.outputs.DEV_VERSION }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⚙️ Generate Dev Version
        id: generate-dev-version
        run: |
          PKG_JSON_VERSION=$(cat package.json | jq -r '.version')
          GIT_HASH=$(git rev-parse --short HEAD)
          DEV_VERSION=$PKG_JSON_VERSION-dev.$(date +"%s").$GIT_HASH
          echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT
        shell: bash

  publish_dev:
    name: 🚀 Publish Dev Build
    needs: get_dev_version
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: dev
      version: ${{ needs.get_dev_version.outputs.dev-version }}

